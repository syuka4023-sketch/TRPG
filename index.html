<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TRPG管理ツール</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#333333">
  <style>
    *{box-sizing:border-box}
    body{
      font-family:sans-serif;
      margin:0;
      padding:16px;
      background:#f5f5f5;
      color:#222;
    }
    .wrap{
      max-width:800px;
      margin:0 auto;
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:18px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      margin-bottom:16px;
    }
    .menu{
      display:grid;
      gap:12px;
    }
    .menu a, .menu button{
      display:block;
      width:100%;
      text-decoration:none;
      color:#222;
      background:#fff;
      border-radius:16px;
      padding:18px;
      font-size:18px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      border:1px solid #ddd;
      text-align:left;
      cursor:pointer;
    }
    .sub{
      color:#666;
      font-size:14px;
      margin-top:6px;
      line-height:1.5;
    }
    .muted{
      color:#666;
      font-size:13px;
      margin-top:8px;
      line-height:1.5;
    }

    @media (max-width: 768px){
      body{padding:12px}
      .card{padding:14px;border-radius:14px}
      .menu a, .menu button{
        padding:16px;
        font-size:17px;
        border-radius:14px;
      }
      h1{
        font-size:24px;
        margin:0 0 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>TRPG管理ツール</h1>
      <p>シナリオ・セッション・キャラクターをまとめて管理できます。</p>
      <div class="muted" id="swStatus">アプリ更新状態を確認中...</div>
    </div>

    <div class="menu">
      <a href="scenarios.html">
        シナリオ一覧
        <div class="sub">回せるシナリオの登録・編集・管理</div>
      </a>
      <a href="sessions.html">
        セッション一覧
        <div class="sub">予定 / 通過 / 中断などの管理</div>
      </a>
      <a href="characters.html">
        キャラ一覧
        <div class="sub">画像・タグ・メモ・質問管理</div>
      </a>
    </div>

    <div class="card">
      <h2>データ同期 / バックアップ</h2>
      <div class="menu">
        <button type="button" onclick="exportBackup()">バックアップを書き出す</button>
        <button type="button" onclick="document.getElementById('importFile').click()">バックアップを読み込む</button>
      </div>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    </div>

    <div class="card">
      <h2>アプリ更新</h2>
      <div class="menu">
        <button type="button" onclick="forceServiceWorkerUpdate()">最新版を確認して更新する</button>
        <button type="button" onclick="hardReloadApp()">再読み込みする</button>
      </div>
      <div class="muted">
        画面が古いままのときは、ここから更新できます。
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    let swRefreshing = false;

    function setSwStatus(text) {
      const el = document.getElementById("swStatus");
      if (el) el.textContent = text;
    }

    function exportBackup() {
      exportAllData();
    }

    document.getElementById("importFile").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (!confirm("現在のデータを上書きして読み込みますか？")) {
        e.target.value = "";
        return;
      }

      importAllDataFromFile(file, function(ok) {
        if (ok) {
          alert("読み込みました");
          location.reload();
        }
      });

      e.target.value = "";
    });

    async function forceServiceWorkerUpdate() {
      if (!("serviceWorker" in navigator)) {
        alert("このブラウザはサービスワーカーに対応していません");
        return;
      }

      setSwStatus("最新版を確認しています...");

      try {
        const registrations = await navigator.serviceWorker.getRegistrations();
        if (!registrations.length) {
          await navigator.serviceWorker.register("./service-worker.js");
        }

        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg => reg.update()));

        setSwStatus("更新確認を実行しました。必要なら自動で再読み込みされます。");
        alert("更新確認を実行しました");
      } catch (err) {
        console.error(err);
        setSwStatus("更新確認に失敗しました。");
        alert("更新確認に失敗しました");
      }
    }

    function hardReloadApp() {
      location.reload();
    }

    async function setupServiceWorker() {
      if (!("serviceWorker" in navigator)) {
        setSwStatus("このブラウザはアプリ更新機能に未対応です。");
        return;
      }

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (swRefreshing) return;
        swRefreshing = true;
        location.reload();
      });

      try {
        const registration = await navigator.serviceWorker.register("./service-worker.js");
        setSwStatus("アプリ更新機能は有効です。");

        await registration.update();

        const existingRegs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(existingRegs.map(reg => reg.update()));
      } catch (err) {
        console.error("SW登録失敗", err);
        setSwStatus("アプリ更新機能の初期化に失敗しました。");
      }
    }

    setupServiceWorker();
  </script>
</body>
</html>
