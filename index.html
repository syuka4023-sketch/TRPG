<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TRPG管理ツール</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#333333">
  <style>
    *{box-sizing:border-box}
    body{
      font-family:sans-serif;
      margin:0;
      padding:16px;
      background:#f5f5f5;
      color:#222;
    }
    .wrap{
      max-width:800px;
      margin:0 auto;
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:18px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      margin-bottom:16px;
    }
    .menu{
      display:grid;
      gap:12px;
    }
    .menu a{
      display:block;
      text-decoration:none;
      color:#222;
      background:#fff;
      border-radius:16px;
      padding:18px;
      font-size:18px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    .sub{
      color:#666;
      font-size:14px;
      margin-top:6px;
      line-height:1.5;
    }

    @media (max-width: 768px){
      body{padding:12px}
      .card{padding:14px;border-radius:14px}
      .menu a{
        padding:16px;
        font-size:17px;
        border-radius:14px;
      }
      h1{
        font-size:24px;
        margin:0 0 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>TRPG管理ツール</h1>
      <p>シナリオ・セッション・キャラクターをまとめて管理できます。</p>
    </div>

    <div class="menu">
      <a href="scenarios.html">
        シナリオ一覧
        <div class="sub">回せるシナリオの登録・編集・管理</div>
      </a>
      <a href="sessions.html">
        セッション一覧
        <div class="sub">予定 / 通過 / 中断などの管理</div>
      </a>
      <a href="characters.html">
        キャラ一覧
        <div class="sub">画像・タグ・メモ・質問管理</div>
      </a>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js")
        .catch(err => console.log("SW登録失敗", err));
    }
  </script>
</body>
</html>
