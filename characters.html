<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>キャラ一覧</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:sans-serif;margin:0;padding:16px;background:#f5f5f5;color:#222}
    .wrap{max-width:1100px;margin:0 auto}
    .panel{background:#fff;padding:16px;border-radius:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input, button, select{
      font:inherit;padding:12px;border-radius:12px;border:1px solid #ccc
    }
    .grow{flex:1;min-width:180px}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));
      gap:12px;
    }
    .icon-card{
      background:#fff;
      border-radius:16px;
      padding:12px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      text-align:center;
      cursor:pointer;
    }
    .thumb{
      width:96px;
      height:96px;
      object-fit:cover;
      border-radius:14px;
      background:#eee;
      display:block;
      margin:0 auto 10px;
    }
    .name{
      font-weight:bold;
      line-height:1.4;
      word-break:break-word;
      font-size:14px;
    }

    @media (max-width: 768px){
      body{padding:12px}
      .panel{padding:14px;border-radius:14px}
      input, button, select{
        width:100%;
        min-width:0;
      }
      .grow{min-width:0}
      .grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:10px;
      }
      .icon-card{
        padding:10px;
        border-radius:14px;
      }
      .thumb{
        width:88px;
        height:88px;
        border-radius:12px;
      }
    }
    .muted{color:#666;font-size:13px;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="index.html">← 戻る</a></p>

    <div class="panel">
      <h2>キャラ一覧</h2>
      <div class="muted" id="countText">0件</div>
      <div class="row">
        <input id="search" class="grow" placeholder="検索（名前・タグ・メモ・URL）" oninput="render()">
        <select id="sortBy" onchange="render()">
          <option value="created_desc">新しい順</option>
          <option value="created_asc">古い順</option>
          <option value="name_asc">名前昇順</option>
          <option value="name_desc">名前降順</option>
        </select>
        <button onclick="addCharacter()">＋ キャラ追加</button>
      </div>
    </div>

    <div id="list" class="grid"></div>
  </div>

  <script src="data.js"></script>
  <script>
    async function addCharacter() {
      const name = prompt("キャラ名");
      if (!name || !name.trim()) return;

      const c = {
        id: uid(),
        name: name.trim(),
        url: "",
        images: [],
        tags: [],
        memo: "",
        questions: defaultQuestions()
      };

      characters.unshift(c);
      const ok = await saveAll();
      if (!ok) {
        characters.shift();
        return;
      }
      location.href = `character_detail.html?id=${encodeURIComponent(c.id)}`;
    }

    function compareText(a, b) {
      return String(a || "").localeCompare(String(b || ""), "ja");
    }

    function sortCharacters(list, sortBy) {
      const copied = [...list];
      switch (sortBy) {
        case "created_asc":
          copied.sort((a, b) => compareText(a.id, b.id));
          break;
        case "name_asc":
          copied.sort((a, b) => compareText(a.name, b.name));
          break;
        case "name_desc":
          copied.sort((a, b) => compareText(b.name, a.name));
          break;
        case "created_desc":
        default:
          copied.sort((a, b) => compareText(b.id, a.id));
          break;
      }
      return copied;
    }

    function render() {
      const word = document.getElementById("search").value.trim().toLowerCase();
      const sortBy = document.getElementById("sortBy").value;

      const filtered = characters.filter(c => {
        const text = [
          c.name,
          c.url || "",
          (c.tags || []).join(" "),
          c.memo || ""
        ].join(" ").toLowerCase();
        return text.includes(word);
      });

      const sorted = sortCharacters(filtered, sortBy);

      document.getElementById("countText").textContent =
       `表示 ${sorted.length}件 / 全 ${characters.length}件`;

      document.getElementById("list").innerHTML = sorted.map(c => `
        <div class="icon-card" onclick="location.href='character_detail.html?id=${encodeURIComponent(c.id)}'">
          <img class="thumb" src="${c.images?.[0] || ''}" alt="">
          <div class="name">${escapeHtml(c.name)}</div>
        </div>
      `).join("") || `<div class="panel">キャラクターがありません。</div>`;
    }

    async function init() {
      await window.__dataReady;
      render();
    }

    init();
  </script>
</body>
</html>
