<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャラ詳細</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:sans-serif;margin:0;padding:20px;background:#f5f5f5;color:#222}
    .wrap{max-width:1000px;margin:0 auto}
    .card{background:#fff;padding:16px;border-radius:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input, textarea, select, button{
      font:inherit;padding:10px;border-radius:10px;border:1px solid #ccc
    }
    input, textarea, select{background:#fff}
    textarea{width:100%;min-height:90px;resize:vertical}
    .grow{flex:1;min-width:180px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .tag{
      display:inline-flex;align-items:center;gap:6px;
      background:#eee;padding:6px 10px;border-radius:999px;margin:4px
    }
    .thumb{
      width:130px;height:130px;object-fit:cover;border-radius:14px;background:#eee
    }
    .img-box{
      display:inline-flex;flex-direction:column;gap:8px;margin:8px;vertical-align:top
    }
    .q-item,.related-item,.view-item,.history-item{
      border:1px solid #ddd;border-radius:12px;padding:12px;margin-bottom:10px;background:#fafafa
    }
    .muted{color:#666;font-size:14px}
    .hidden{display:none}
    a{color:#222}
    canvas{background:#fff;border-radius:16px;padding:8px}
    .session-name{
      display:inline-block;background:#eee;border-radius:999px;padding:4px 8px;margin:4px 6px 0 0;font-size:13px
    }
    @media (max-width: 768px){
      body{padding:12px}
      .card{padding:14px;border-radius:14px}
      .row{gap:8px}
      input, textarea, select, button{
        width:100%;
        min-width:0;
      }
      .grow{min-width:0}
    }

    .tag-suggestion-item{
      padding:10px 12px;
      border-top:1px solid #eee;
      cursor:pointer;
    }
    .tag-suggestion-item:first-child{
      border-top:none;
    }
    .tag-suggestion-item:hover{
      background:#f5f5f5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="characters.html">← キャラ一覧へ戻る</a></p>

    <div class="card">
      <div class="row" style="align-items:center;">
        <h2 id="pageTitle" style="margin:0;flex:1;">キャラ詳細</h2>
        <button id="editToggleBtn" type="button" onclick="toggleEditMode()">編集する</button>
      </div>
    </div>

    <div id="viewMode">
      <div class="card">
        <div class="view-item"><b>名前:</b> <span id="viewName"></span></div>
        <div class="view-item"><b>URL:</b> <span id="viewUrl"></span></div>
        <div class="view-item"><b>タグ:</b> <span id="viewTags"></span></div>
        <div class="view-item"><b>メモ:</b><br><span id="viewMemo"></span></div>
      </div>

      <div class="card">
        <h3>画像</h3>
        <div id="viewImages"></div>
      </div>

      <div class="card">
        <h3>通過したシナリオ</h3>
        <div id="scenarioHistory"></div>
      </div>

      <div class="card">
        <h3>関係のあるキャラ</h3>
        <div class="muted" style="margin-bottom:10px;">
          同じセッションに参加している管理キャラと、関連PCを表示します。
        </div>
        <div id="relatedCharacters"></div>
      </div>

      <div class="card">
        <h3>質問</h3>
        <div id="viewQuestions"></div>
      </div>

      <div class="card">
        <h3>レーダーチャート</h3>
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div id="editMode" class="hidden">
      <div class="card">
        <div class="row">
          <input id="nameInput" class="grow" placeholder="キャラ名">
          <button type="button" onclick="saveCharacter()">保存</button>
          <button type="button" onclick="deleteCharacter()">削除</button>
        </div>
        <div style="margin-top:10px;">
          <input id="urlInput" class="grow" placeholder="URL（いあキャラ / ゆとシート / 紹介ページなど）">
        </div>
        <div style="margin-top:10px;">
          <input id="imageUrlInput" class="grow" placeholder="画像URLを直接貼る">
        </div>
        <div class="actions">
          <button type="button" onclick="importImageFromUrlInput()">URLから画像取得を試す</button>
          <button type="button" onclick="importImageFromImageUrl()">画像URLから取り込む</button>
        </div>
      </div>

      <div class="card">
        <h3>画像</h3>
        <div class="row">
          <input type="file" id="fileInput" accept="image/*">
          <button type="button" onclick="addImageFromFile()">画像追加</button>
        </div>
        <div class="muted" style="margin-top:8px;">画像は保存前に自動縮小されます。</div>
        <div id="images" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <h3>タグ</h3>
        <div class="row">
          <input id="tagInput" class="grow" placeholder="タグ名" oninput="renderTagSuggestions()">
          <button type="button" onclick="addTag()">タグ追加</button>
        </div>
        <div id="tagSuggestions" style="margin-top:10px;"></div>
        <div id="tags" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <h3>メモ</h3>
        <textarea id="memo"></textarea>
      </div>

      <div class="card">
        <h3>質問</h3>
        <div class="row" style="margin-bottom:10px;">
          <input id="newQuestionText" class="grow" placeholder="新しい質問文">
          <select id="newQuestionType">
            <option value="text">テキスト</option>
            <option value="scale">スライダー</option>
          </select>
          <button type="button" onclick="addQuestion()">質問追加</button>
        </div>
        <div id="questions"></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    let character = null;
    let chartInstance = null;
    let isEditMode = false;
    let characterId = null;

    async function resizeImageFile(file, maxSize = 800, quality = 0.68) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const img = await new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = dataUrl;
      });

      return resizeImageFromImageElement(img, maxSize, quality);
    }

    async function resizeImageFromImageElement(img, maxSize = 800, quality = 0.68) {
      let { width, height } = img;

      if (width > height && width > maxSize) {
        height = Math.round((height * maxSize) / width);
        width = maxSize;
      } else if (height >= width && height > maxSize) {
        width = Math.round((width * maxSize) / height);
        height = maxSize;
      }

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img, 0, 0, width, height);

      return canvas.toDataURL("image/jpeg", quality);
    }

    function toggleEditMode(forceValue) {
      isEditMode = typeof forceValue === "boolean" ? forceValue : !isEditMode;
      document.getElementById("viewMode").classList.toggle("hidden", isEditMode);
      document.getElementById("editMode").classList.toggle("hidden", !isEditMode);
      document.getElementById("editToggleBtn").textContent = isEditMode ? "表示に戻る" : "編集する";

      if (isEditMode) renderEditMode();
      else renderViewMode();
    }

    async function saveCharacter() {
      character.name = document.getElementById("nameInput").value.trim() || "無名キャラ";
      character.url = document.getElementById("urlInput").value.trim();
      character.imageUrl = document.getElementById("imageUrlInput").value.trim();
      character.memo = document.getElementById("memo").value;

      if (await saveAll()) {
        renderViewMode();
        toggleEditMode(false);
        alert("保存しました");
      }
    }

    async function deleteCharacter() {
      if (!confirm("このキャラクターを削除しますか？")) return;
      characters = characters.filter(c => toId(c.id) !== toId(characterId));
      removeCharacterFromSessions(characterId);

      if (await saveAll()) location.href = "characters.html";
    }

    async function addImageFromFile() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) {
        alert("画像を選択してください");
        return;
      }

      try {
        const resized = await resizeImageFile(file, 640, 0.6);
        character.images = character.images || [];
        character.images.push(resized);

        const ok = await saveAll(false);
        if (ok) {
          document.getElementById("fileInput").value = "";
          renderImages();
        } else {
          character.images.pop();
        }
      } catch (e) {
        console.error(e);
        alert("画像の縮小または保存に失敗しました");
      }
    }

    async function deleteImage(index) {
      if (!confirm("この画像を削除しますか？")) return;
      character.images.splice(index, 1);
      await saveAll(false);
      renderImages();
    }

    async function moveImage(index, dir) {
      const next = index + dir;
      if (next < 0 || next >= character.images.length) return;
      [character.images[index], character.images[next]] = [character.images[next], character.images[index]];
      await saveAll(false);
      renderImages();
    }

    function renderImages() {
      const box = document.getElementById("images");
      box.innerHTML = (character.images || []).map((img, i) => `
        <div class="img-box">
          <img class="thumb" src="${img}" alt="">
          <div class="actions">
            <button type="button" onclick="moveImage(${i}, -1)">←</button>
            <button type="button" onclick="moveImage(${i}, 1)">→</button>
            <button type="button" onclick="deleteImage(${i})">削除</button>
          </div>
        </div>
      `).join("") || "画像なし";
    }

    async function addTag() {
      const input = document.getElementById("tagInput");
      const val = input.value.trim();
      if (!val) return;

      character.tags = character.tags || [];
      if (!character.tags.includes(val)) {
        character.tags.push(val);
        await saveAll(false);
      }
      input.value = "";
      renderTags();
      renderTagSuggestions();
    }

    async function deleteTag(index) {
      character.tags.splice(index, 1);
      await saveAll(false);
      renderTags();
      renderTagSuggestions();
    }

    function renderTags() {
      document.getElementById("tags").innerHTML =
        (character.tags || []).map((tag, i) => `
          <span class="tag">
            ${escapeHtml(tag)}
            <button type="button" onclick="deleteTag(${i})">×</button>
          </span>
        `).join("") || "タグなし";
    }

    async function addQuestion() {
      const q = document.getElementById("newQuestionText").value.trim();
      const type = document.getElementById("newQuestionType").value;
      if (!q) return;

      character.questions.push({
        id: uid(),
        q,
        type,
        value: type === "scale" ? 3 : ""
      });

      await saveAll(false);
      document.getElementById("newQuestionText").value = "";
      renderQuestions();
      drawChart();
    }

    async function updateQuestionText(index, value) {
      character.questions[index].q = value;
      await saveAll(false);
      drawChart();
    }

    async function updateQuestionValue(index, value) {
      const q = character.questions[index];
      if (!q) return;

      q.value = q.type === "scale" ? Number(value) : value;
      await saveAll(false);

      if (q.type === "scale") {
        renderQuestions();
        drawChart();
      }
    }

    async function deleteQuestion(index) {
      if (!confirm("この質問を削除しますか？")) return;
      character.questions.splice(index, 1);
      await saveAll(false);
      renderQuestions();
      drawChart();
    }

    function renderQuestions() {
      const box = document.getElementById("questions");
      box.innerHTML = (character.questions || []).map((q, i) => `
        <div class="q-item">
          <div class="row">
            <input class="grow" value="${escapeHtml(q.q)}" oninput="updateQuestionText(${i}, this.value)">
            <button type="button" onclick="deleteQuestion(${i})">削除</button>
          </div>
          ${
            q.type === "scale"
              ? `
                <div style="margin-top:10px;">
                  <div class="muted">1: いいえ 〜 5: はい</div>
                  <input type="range" min="1" max="5" step="1" value="${Number(q.value || 3)}"
                    oninput="updateQuestionValue(${i}, this.value)">
                  <div>現在値: ${Number(q.value || 3)}</div>
                </div>
              `
              : `
                <div style="margin-top:10px;">
                  <textarea oninput="updateQuestionValue(${i}, this.value)">${escapeHtml(q.value || "")}</textarea>
                </div>
              `
          }
        </div>
      `).join("") || "質問なし";
    }

    function getFirstDateValue(session) {
      const first = Array.isArray(session.dates) && session.dates.length ? session.dates[0] : "";
      const t = Date.parse(first);
      return Number.isNaN(t) ? -Infinity : t;
    }

    function renderScenarioHistory() {
      const participated = getSessionsByCharacterId(characterId)
        .slice()
        .sort((a, b) => getFirstDateValue(b) - getFirstDateValue(a));

      document.getElementById("scenarioHistory").innerHTML = participated.map(s => {
        const scenario = getScenarioById(s.scenarioId);
        const title = scenario?.title || s.title || "無題セッション";
        return `
          <div class="history-item">
            <div><b>${escapeHtml(title)}</b></div>
            <div class="muted">日付: ${escapeHtml((s.dates || []).join(" / ") || "未設定")}</div>
            <div class="muted">状態: ${escapeHtml(s.status || "予定")}</div>
            <div class="muted">
              <a href="session_detail.html?id=${encodeURIComponent(s.id)}">セッション詳細を見る</a>
            </div>
          </div>
        `;
      }).join("") || "通過履歴なし";
    }

    function renderRelatedCharacters() {
      const related = getRelatedCharacters(characterId);

      document.getElementById("relatedCharacters").innerHTML = related.map(item => {
        if (item.type === "character") {
          const charId = item.character?.id ? encodeURIComponent(item.character.id) : "";
          return `
            <div class="related-item">
              <div>
                ${
                  charId
                    ? `<a href="character_detail.html?id=${charId}"><b>${escapeHtml(item.displayName || item.character?.name || "未設定")}</b></a>`
                    : `<b>${escapeHtml(item.displayName || "未設定")}</b>`
                }
              </div>
              <div class="muted">一緒だったセッション:</div>
              <div>
                ${item.sessions.map(s => `<span class="session-name">${escapeHtml(s.title)}</span>`).join("")}
              </div>
            </div>
          `;
        }

        return `
          <div class="related-item">
            <div><b>関連PC: ${escapeHtml(item.displayName || item.relatedPC?.pc || "未設定")}</b></div>
            <div class="muted">PL: ${escapeHtml(item.relatedPC?.player || "未設定")}</div>
            <div class="muted">
              ${item.relatedPC?.url ? `<a href="${escapeHtml(item.relatedPC.url)}" target="_blank" rel="noopener noreferrer">URLを開く</a>` : "URLなし"}
            </div>
            <div class="muted" style="margin-top:8px;">一緒だったセッション:</div>
            <div>
              ${item.sessions.map(s => `<span class="session-name">${escapeHtml(s.title)}</span>`).join("")}
            </div>
          </div>
        `;
      }).join("") || "関係のあるキャラなし";
    }

    function renderViewMode() {
      character.images = Array.isArray(character.images) ? character.images : [];
      character.tags = Array.isArray(character.tags) ? character.tags : [];
      character.questions = Array.isArray(character.questions) && character.questions.length
        ? character.questions
        : defaultQuestions();

      document.getElementById("pageTitle").textContent = character.name || "キャラ詳細";
      document.getElementById("viewName").textContent = character.name || "無名キャラ";
      document.getElementById("viewUrl").innerHTML = character.url
        ? `<a href="${escapeHtml(character.url)}" target="_blank" rel="noopener noreferrer">URLを開く</a>`
        : "未設定";
      document.getElementById("viewTags").textContent = (character.tags || []).join(" / ") || "なし";
      document.getElementById("viewMemo").textContent = character.memo || "未設定";

      document.getElementById("viewImages").innerHTML =
        character.images && character.images.length
          ? character.images.map(img => `
              <div class="img-box">
                <img class="thumb" src="${img}" alt="">
              </div>
            `).join("")
          : (
              character.imageUrl
                ? `<div class="muted">画像未登録。<a href="${escapeHtml(character.imageUrl)}" target="_blank" rel="noopener noreferrer">画像URLを開く</a></div>`
                : character.url
                  ? `<div class="muted">画像取得失敗。<a href="${escapeHtml(character.url)}" target="_blank" rel="noopener noreferrer">URLを開く</a></div>`
                  : "画像なし"
            );

      document.getElementById("viewQuestions").innerHTML = character.questions.map(q => `
        <div class="q-item">
          <div><b>${escapeHtml(q.q)}</b></div>
          <div class="muted" style="margin-top:8px;">
            ${q.type === "scale" ? `回答: ${Number(q.value || 3)}` : escapeHtml(q.value || "未回答")}
          </div>
        </div>
      `).join("") || "質問なし";

      renderScenarioHistory();
      renderRelatedCharacters();
      drawChart();
    }

    function renderEditMode() {
      character.images = Array.isArray(character.images) ? character.images : [];
      character.tags = Array.isArray(character.tags) ? character.tags : [];
      character.questions = Array.isArray(character.questions) && character.questions.length
        ? character.questions
        : defaultQuestions();

      document.getElementById("nameInput").value = character.name || "";
      document.getElementById("urlInput").value = character.url || "";
      document.getElementById("imageUrlInput").value = character.imageUrl || "";
      document.getElementById("memo").value = character.memo || "";

      renderImages();
      renderTags();
      renderQuestions();
      renderTagSuggestions();
    }

    function drawChart() {
      const canvas = document.getElementById("chart");
      const scales = (character.questions || [])
        .filter(q => q.type === "scale")
        .sort((a, b) => {
          const order = ["好奇心", "世話焼き", "野蛮度", "協調性", "素直さ"];
          return order.indexOf(a.q) - order.indexOf(b.q);
        });

      if (chartInstance) chartInstance.destroy();
      if (scales.length === 0) return;

      chartInstance = new Chart(canvas, {
        type: "radar",
        data: {
          labels: scales.map(q => q.q),
          datasets: [{
            label: character.name || "キャラ",
            data: scales.map(q => Number(q.value || 3))
          }]
        },
        options: {
          responsive: true,
          scales: {
            r: {
              min: 1,
              max: 5,
              ticks: { stepSize: 1 }
            }
          }
        }
      });
    }

    function guessImageCandidatesFromPageUrl(url) {
      const u = String(url || "").trim();
      if (!u) return [];

      const candidates = [];
      candidates.push(u + (u.includes("?") ? "&" : "?") + "image=1");
      candidates.push(u.replace(/\/$/, "") + "/image");
      candidates.push(u.replace(/\/$/, "") + "/img");
      candidates.push(u.replace(/\/$/, "") + "/portrait");
      candidates.push(u.replace(/\/$/, "") + "/icon");

      return [...new Set(candidates)];
    }

    async function loadImageElement(url) {
      return await new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.referrerPolicy = "no-referrer";
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("画像読み込み失敗"));
        img.src = url;
      });
    }

    async function tryImportImageFromUrl(url, direct = false) {
      const targetUrls = direct
        ? [String(url || "").trim()].filter(Boolean)
        : guessImageCandidatesFromPageUrl(url);

      for (const candidate of targetUrls) {
        try {
          const img = await loadImageElement(candidate);
          const resized = await resizeImageFromImageElement(img, 800, 0.68);
          return { ok: true, imageDataUrl: resized, imageUrl: candidate };
        } catch (e) {
        }
      }

      return { ok: false, imageDataUrl: null, imageUrl: null };
    }

    async function importImageFromUrlInput() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) {
        alert("URLを入力してください");
        return;
      }

      character.url = url;

      const result = await tryImportImageFromUrl(url, false);

      if (result.ok && result.imageDataUrl) {
        character.images = Array.isArray(character.images) ? character.images : [];
        character.images.unshift(result.imageDataUrl);

        const ok = await saveAll(false);
        if (!ok) {
          character.images.shift();
          return;
        }

        alert("画像取得に成功しました");
        renderImages();
        renderViewMode();
        return;
      }

      const ok = await saveAll(false);
      if (!ok) return;

      alert("画像取得はできませんでした。URLのみ保存しました。");
      renderViewMode();
    }

    async function importImageFromImageUrl() {
      const imageUrl = document.getElementById("imageUrlInput").value.trim();
      if (!imageUrl) {
        alert("画像URLを入力してください");
        return;
      }

      character.imageUrl = imageUrl;

      const result = await tryImportImageFromUrl(imageUrl, true);

      if (result.ok && result.imageDataUrl) {
        character.images = Array.isArray(character.images) ? character.images : [];
        character.images.unshift(result.imageDataUrl);

        const ok = await saveAll(false);
        if (!ok) {
          character.images.shift();
          return;
        }

        alert("画像URLから取り込みました");
        renderImages();
        renderViewMode();
        return;
      }

      const ok = await saveAll(false);
      if (!ok) return;

      alert("画像取得はできませんでした。画像URLのみ保存しました。");
      renderViewMode();
    }

    async function init() {
      await window.__dataReady;
      characterId = new URLSearchParams(location.search).get("id");
      character = getCharacterById(characterId);

      if (!character) {
        location.href = "characters.html";
        return;
      }

      renderViewMode();
      toggleEditMode(false);
    }
    function getAllExistingTags() {
  const tagSet = new Set();

  (characters || []).forEach(c => {
    (c.tags || []).forEach(tag => {
      const t = String(tag || "").trim();
      if (t) tagSet.add(t);
    });
  });

  return [...tagSet].sort((a, b) => a.localeCompare(b, "ja"));
}

function selectTagSuggestion(tag) {
      document.getElementById("tagInput").value = tag;
      renderTagSuggestions();
    }

    function renderTagSuggestions() {
      const input = document.getElementById("tagInput");
      const box = document.getElementById("tagSuggestions");
      if (!input || !box) return;

      const keyword = String(input.value || "").trim().toLowerCase();
      if (!keyword) {
        box.innerHTML = "";
        return;
      }
    
      const currentTags = new Set((character.tags || []).map(t => String(t || "").trim()));
      const matched = getAllExistingTags()
        .filter(tag => tag.toLowerCase().includes(keyword))
        .filter(tag => !currentTags.has(tag))
        .slice(0, 10);
    
      box.innerHTML = matched.length ? `
        <div class="candidate-list">
          ${matched.map(tag => `
            <div class="tag-suggestion-item" onclick="selectTagSuggestion('${String(tag).replace(/'/g, "\\'")}')">
              ${escapeHtml(tag)}
            </div>
          `).join("")}
        </div>
      ` : "";
    }

    init();
  </script>
</body>
</html>
