<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セッション詳細</title>
  <style>
    body{font-family:sans-serif;margin:0;padding:20px;background:#f5f5f5;color:#222}
    .wrap{max-width:1000px;margin:0 auto}
    .card{background:#fff;padding:16px;border-radius:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input, textarea, select, button{
      font:inherit;padding:10px;border-radius:10px;border:1px solid #ccc
    }
    input, textarea, select{background:#fff}
    textarea{width:100%;min-height:90px;resize:vertical}
    .grow{flex:1;min-width:180px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .linked-char-item,.view-item,.related-pc-item{
      border:1px solid #ddd;border-radius:12px;padding:12px;margin-bottom:10px;background:#fafafa
    }
    .muted{color:#666;font-size:14px}
    .hidden{display:none}
    a{color:#222}
    .section-title{margin:0 0 10px 0}
    .candidate-list{
      margin-top:10px;
      border:1px solid #ddd;
      border-radius:12px;
      background:#fff;
      overflow:hidden;
    }
    .candidate-item{
      padding:10px 12px;
      border-top:1px solid #eee;
      cursor:pointer;
    }
    .candidate-item:first-child{
      border-top:none;
    }
    .candidate-item:hover{
      background:#f5f5f5;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#eee;
      border-radius:999px;
      padding:6px 10px;
      margin:4px 6px 4px 0;
    }
    @media (max-width: 768px){
      body{padding:12px}
      .card{padding:14px;border-radius:14px}
      .row{gap:8px}
      input, textarea, select, button{
        width:100%;
        min-width:0;
      }
      .grow{min-width:0}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="sessions.html">← セッション一覧へ戻る</a></p>

    <div class="card">
      <div class="row" style="align-items:center;">
        <h2 id="pageTitle" style="margin:0;flex:1;">セッション詳細</h2>
        <button id="editToggleBtn" type="button" onclick="toggleEditMode()">編集する</button>
      </div>
    </div>

    <div id="viewMode">
      <div class="card">
        <h3 class="section-title">基本情報</h3>
        <div class="view-item"><b>シナリオ:</b> <span id="viewScenario"></span></div>
        <div class="view-item"><b>KP:</b> <span id="viewKp"></span></div>
        <div class="view-item"><b>状態:</b> <span id="viewStatus"></span></div>
        <div class="view-item"><b>日程:</b> <span id="viewDates"></span></div>
        <div class="view-item"><b>ログURL:</b><br><span id="viewLogUrls"></span></div>
        <div class="view-item"><b>メモ:</b><br><span id="viewMemo"></span></div>
      </div>

      <div class="card">
        <h3 class="section-title">参加キャラクター</h3>
        <div id="viewLinkedCharacters"></div>
      </div>

      <div class="card">
        <h3 class="section-title">関連PC</h3>
        <div id="viewRelatedPCs"></div>
      </div>
    </div>

    <div id="editMode" class="hidden">
      <div class="card">
        <div class="row">
          <input id="scenarioNameInput" class="grow" placeholder="シナリオ名を入力" oninput="renderScenarioSuggestions()">
        </div>
        <div id="scenarioSuggestions"></div>

        <div class="row" style="margin-top:10px;">
          <input id="kp" class="grow" placeholder="KP">
          <select id="status" class="grow">
            <option value="予定">予定</option>
            <option value="通過">通過</option>
            <option value="中断">中断</option>
            <option value="中止">中止</option>
          </select>
        </div>
        <div style="margin-top:10px;">
          <textarea id="dates" placeholder="日付 / 日程（1行に1件）&#10;例: 2026-04-20 21:00&#10;例: 2026-05-01"></textarea>
        </div>
        <div style="margin-top:10px;">
          <textarea id="logUrls" placeholder="ログURL（1行に1件）&#10;例: https://example.com/log1&#10;https://example.com/log2"></textarea>
        </div>
        <div style="margin-top:10px;">
          <textarea id="memo" placeholder="メモ"></textarea>
        </div>
        <div class="actions">
          <button type="button" onclick="saveSession()">保存</button>
          <button type="button" onclick="deleteSession()">削除</button>
        </div>
      </div>

      <div class="card">
        <h3>参加キャラクター</h3>
        <div class="row">
          <input id="characterSearchInput" class="grow" placeholder="キャラクター名・タグで検索" oninput="renderCharacterSelector()">
        </div>
        <div id="selectedCharacterPills" style="margin-top:10px;"></div>
        <div id="characterSelector" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <h3>関連PC</h3>
        <div class="actions">
          <button type="button" onclick="addRelatedPC()">＋ 関連PC追加</button>
        </div>
        <div id="relatedPCsBox" style="margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    let session = null;
    let sessionId = null;
    let isEditMode = false;

    function ensureCharIds() {
      if (!Array.isArray(session.charIds)) session.charIds = [];
      session.charIds = [...new Set(session.charIds.map(toId).filter(Boolean))];
    }

    function ensureLogUrls() {
      if (!Array.isArray(session.logUrls)) session.logUrls = [];
      session.logUrls = session.logUrls.map(v => String(v || "").trim()).filter(Boolean);
    }

    function ensureRelatedPCs() {
      if (!Array.isArray(session.relatedPCs)) session.relatedPCs = [];
      session.relatedPCs = session.relatedPCs.map(normalizeRelatedPC);
    }

    function getSessionDisplayTitle() {
      return session.title || getScenarioById(session.scenarioId)?.title || "無題セッション";
    }

    function toggleEditMode(forceValue) {
      isEditMode = typeof forceValue === "boolean" ? forceValue : !isEditMode;
      document.getElementById("viewMode").classList.toggle("hidden", isEditMode);
      document.getElementById("editMode").classList.toggle("hidden", !isEditMode);
      document.getElementById("editToggleBtn").textContent = isEditMode ? "表示に戻る" : "編集する";

      if (!session) return;
      if (isEditMode) renderEditMode();
      else renderViewMode();
    }

    function getScenarioNameInputValue() {
      return document.getElementById("scenarioNameInput").value.trim();
    }

    function renderScenarioSuggestions() {
      const box = document.getElementById("scenarioSuggestions");
      const keyword = getScenarioNameInputValue().toLowerCase();

      if (!keyword) {
        box.innerHTML = "";
        return;
      }

      const matched = scenarios
        .filter(s => String(s.title || "").toLowerCase().includes(keyword))
        .slice(0, 10);

      box.innerHTML = matched.length ? `
        <div class="candidate-list">
          ${matched.map(s => `
            <div class="candidate-item" onclick="selectScenarioName('${String(s.title).replace(/'/g, "\\'")}')">
              <div><b>${escapeHtml(s.title)}</b></div>
              <div class="muted">
                ${escapeHtml(s.system || "システム未設定")}
                ${s.status ? " / " + escapeHtml(s.status) : ""}
              </div>
            </div>
          `).join("")}
        </div>
      ` : "";
    }

    function selectScenarioName(title) {
      document.getElementById("scenarioNameInput").value = title;
      renderScenarioSuggestions();
    }

    async function addLinkedCharacter(characterId) {
      ensureCharIds();
      if (!session.charIds.includes(toId(characterId))) {
        session.charIds.push(toId(characterId));
        await saveAll(false);
      }
      renderCharacterSelector();
    }

    async function removeLinkedCharacter(characterId) {
      ensureCharIds();
      session.charIds = session.charIds.filter(id => toId(id) !== toId(characterId));
      await saveAll(false);
      renderCharacterSelector();
    }

    function renderCharacterSelector() {
      ensureCharIds();
      const search = (document.getElementById("characterSearchInput")?.value || "").trim().toLowerCase();
      const selectedBox = document.getElementById("selectedCharacterPills");
      const selectorBox = document.getElementById("characterSelector");

      const selectedCharacters = session.charIds.map(cid => getCharacterById(cid)).filter(Boolean);
      selectedBox.innerHTML = selectedCharacters.map(c => `
        <span class="pill">
          ${escapeHtml(c.name)}
          <button type="button" onclick="removeLinkedCharacter('${String(c.id).replace(/'/g, "\\'")}')">×</button>
        </span>
      `).join("") || "未選択";

      const candidates = characters.filter(c => {
        if (session.charIds.includes(toId(c.id))) return false;
        if (!search) return true;
        const text = [
          c.name,
          c.url || "",
          (c.tags || []).join(" "),
          c.memo || ""
        ].join(" ").toLowerCase();
        return text.includes(search);
      }).slice(0, 20);

      selectorBox.innerHTML = candidates.length ? `
        <div class="candidate-list">
          ${candidates.map(c => `
            <div class="candidate-item" onclick="addLinkedCharacter('${String(c.id).replace(/'/g, "\\'")}')">
              <div><b>${escapeHtml(c.name)}</b></div>
              <div class="muted">${escapeHtml((c.tags || []).join(" / ")) || "タグなし"}</div>
            </div>
          `).join("")}
        </div>
      ` : `<div class="muted">候補がありません</div>`;
    }

    async function addRelatedPC() {
      ensureRelatedPCs();
      session.relatedPCs.push({
        id: uid(),
        player: "",
        pc: "",
        url: ""
      });
      await saveAll(false);
      renderRelatedPCsEditor();
    }

    async function updateRelatedPCField(index, field, value) {
      ensureRelatedPCs();
      session.relatedPCs[index][field] = value;
      await saveAll(false);
    }

    async function deleteRelatedPC(index) {
      ensureRelatedPCs();
      session.relatedPCs.splice(index, 1);
      await saveAll(false);
      renderRelatedPCsEditor();
    }

    function renderRelatedPCsEditor() {
      ensureRelatedPCs();
      const box = document.getElementById("relatedPCsBox");
      box.innerHTML = session.relatedPCs.map((row, i) => `
        <div class="related-pc-item">
          <div class="row">
            <input class="grow" placeholder="PL" value="${escapeHtml(row.player || "")}"
              oninput="updateRelatedPCField(${i}, 'player', this.value)">
            <button type="button" onclick="deleteRelatedPC(${i})">削除</button>
          </div>
          <div class="row" style="margin-top:10px;">
            <input class="grow" placeholder="PC" value="${escapeHtml(row.pc || "")}"
              oninput="updateRelatedPCField(${i}, 'pc', this.value)">
          </div>
          <div class="row" style="margin-top:10px;">
            <input class="grow" placeholder="URL" value="${escapeHtml(row.url || "")}"
              oninput="updateRelatedPCField(${i}, 'url', this.value)">
          </div>
        </div>
      `).join("") || "関連PCなし";
    }

    async function saveSession() {
      if (!session) return;

      const scenarioName = getScenarioNameInputValue();
      const matchedScenario = scenarios.find(s => String(s.title || "").trim() === scenarioName);

      session.scenarioId = matchedScenario ? toId(matchedScenario.id) : "";
      session.title = scenarioName || matchedScenario?.title || "無題セッション";
      session.kp = document.getElementById("kp").value.trim();
      session.status = document.getElementById("status").value;
      session.memo = document.getElementById("memo").value.trim();
      session.dates = document.getElementById("dates").value
        .split("\n")
        .map(v => v.trim())
        .filter(Boolean);
      session.logUrls = document.getElementById("logUrls").value
        .split("\n")
        .map(v => v.trim())
        .filter(Boolean);

      ensureCharIds();
      ensureLogUrls();
      ensureRelatedPCs();

      if (await saveAll()) {
        document.getElementById("pageTitle").textContent = getSessionDisplayTitle();
        renderViewMode();
        toggleEditMode(false);
        alert("保存しました");
      }
    }

    async function deleteSession() {
      if (!session) return;
      if (!confirm("このセッションを削除しますか？")) return;

      sessions = sessions.filter(s => toId(s.id) !== toId(sessionId));
      if (await saveAll()) location.href = "sessions.html";
    }

    function renderViewMode() {
      ensureCharIds();
      ensureLogUrls();
      ensureRelatedPCs();

      document.getElementById("pageTitle").textContent = getSessionDisplayTitle();
      document.getElementById("viewScenario").textContent = session.title || "未設定";
      document.getElementById("viewKp").textContent = session.kp || "未設定";
      document.getElementById("viewStatus").textContent = session.status || "予定";
      document.getElementById("viewDates").textContent = (session.dates || []).join(" / ") || "未設定";
      document.getElementById("viewMemo").textContent = session.memo || "未設定";
      document.getElementById("viewLogUrls").innerHTML = (session.logUrls || []).length
        ? session.logUrls.map(url => `<div><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a></div>`).join("")
        : "未設定";

      const linkedCharacters = session.charIds.map(cid => getCharacterById(cid)).filter(Boolean);
      document.getElementById("viewLinkedCharacters").innerHTML = linkedCharacters.map(c => `
        <div class="view-item">
          <div><b>${escapeHtml(c.name)}</b></div>
          <div class="muted">
            <a href="character_detail.html?id=${encodeURIComponent(c.id)}">キャラクター詳細を見る</a>
            ${c.url ? ` / <a href="${escapeHtml(c.url)}" target="_blank" rel="noopener noreferrer">URLを開く</a>` : ""}
          </div>
        </div>
      `).join("") || "参加キャラクターなし";

      document.getElementById("viewRelatedPCs").innerHTML = session.relatedPCs.map(row => `
        <div class="view-item">
          <div><b>PL:</b> ${escapeHtml(row.player || "未設定")}</div>
          <div><b>PC:</b> ${escapeHtml(row.pc || "未設定")}</div>
          <div class="muted">
            ${row.url ? `<a href="${escapeHtml(row.url)}" target="_blank" rel="noopener noreferrer">URLを開く</a>` : "URLなし"}
          </div>
        </div>
      `).join("") || "関連PCなし";
    }

    function renderEditMode() {
      document.getElementById("scenarioNameInput").value = session.title || getScenarioById(session.scenarioId)?.title || "";
      document.getElementById("kp").value = session.kp || "";
      document.getElementById("status").value = session.status || "予定";
      document.getElementById("dates").value = (session.dates || []).join("\n");
      document.getElementById("logUrls").value = (session.logUrls || []).join("\n");
      document.getElementById("memo").value = session.memo || "";

      renderScenarioSuggestions();
      renderCharacterSelector();
      renderRelatedPCsEditor();
    }

    async function init() {
      await window.__dataReady;
      sessionId = new URLSearchParams(location.search).get("id");
      session = getSessionById(sessionId);

      if (!session) {
        location.href = "sessions.html";
        return;
      }

      renderViewMode();
      toggleEditMode(false);
    }

    init();
  </script>
</body>
</html>
